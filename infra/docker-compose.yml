version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: ctme_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ctme_user
      POSTGRES_PASSWORD: ctme_pass
      POSTGRES_DB: ctme_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: ctme_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ctme_user
      MONGO_INITDB_ROOT_PASSWORD: ctme_pass
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: ctme_redis
    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ctme_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ctme.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  mongo_data:
